<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/frontend_v1/js/theme-bootstrap.js"></script>
    <link rel="icon" type="image/svg+xml" href="/frontend_v1/dragon-favicon.svg">
    <title>{% block title %}WorldAI{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/frontend_v1/style.css">
    <link rel="stylesheet" href="/frontend_v1/themes/default.css">
    <link rel="stylesheet" href="/frontend_v1/themes/fantasy.css">
    <link rel="stylesheet" href="/frontend_v1/themes/base.css">

    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-dice-6"></i>
                WorldAI
            </a>
        </div>
    </nav>

    <main class="container-fluid">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase SDKs (required for auth.js) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="/frontend_v1/auth.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
